<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" role="img" aria-labelledby="title desc">
  <title id="title">Kleber Dolli e Fulô da Capitá</title>
  <desc id="desc">Logotipo elegante em fundo marrom com lettering cursivo e detalhes juninos discretos.</desc>
  <defs>
    <linearGradient id="brown" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3a2417"/>
      <stop offset="0.52" stop-color="#5a3721"/>
      <stop offset="1" stop-color="#25160f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#f9e8b8"/>
      <stop offset="0.5" stop-color="#ddb766"/>
      <stop offset="1" stop-color="#fff1c9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#120a06" flood-opacity=".45"/>
    </filter>
    <pattern id="linen" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 0h10v10H0z" fill="transparent"/>
      <path d="M0 8h10M8 0v10" stroke="#fff3d2" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="860" height="320" rx="34" fill="url(#brown)"/>
  <rect width="860" height="320" rx="34" fill="url(#linen)"/>
  <rect x="22" y="22" width="816" height="276" rx="25" fill="none" stroke="#e4c37a" stroke-opacity=".42" stroke-width="2"/>

  <g opacity=".42" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M72 68h156" stroke="#e8c36f" stroke-width="3" stroke-dasharray="10 12"/>
    <path d="M632 68h156" stroke="#e8c36f" stroke-width="3" stroke-dasharray="10 12"/>
    <path d="M86 238c28-18 56-18 84 0s56 18 84 0" stroke="#b83225" stroke-width="4"/>
    <path d="M606 238c28-18 56-18 84 0s56 18 84 0" stroke="#2f7a57" stroke-width="4"/>
  </g>

  <g opacity=".34">
    <path d="M118 88h24l-12 18zM142 88h24l-12 18zM166 88h24l-12 18z" fill="#d9ad54"/>
    <path d="M670 88h24l-12 18zM694 88h24l-12 18zM718 88h24l-12 18z" fill="#d9ad54"/>
    <path d="M142 88h24l-12 18zM694 88h24l-12 18z" fill="#2f7a57" opacity=".95"/>
  </g>

  <g filter="url(#softShadow)">
    <text x="430" y="143"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="84"
      font-style="italic"
      font-weight="700"
      fill="url(#gold)"
      stroke="#1d1009"
      stroke-width="2.2"
      paint-order="stroke">
      Kleber Dolli
    </text>

    <path d="M214 164c73 18 152 24 237 16 78-7 143-1 195 18" fill="none" stroke="#e8c36f" stroke-width="3" stroke-linecap="round" opacity=".72"/>

    <text x="430" y="221"
      text-anchor="middle"
      font-family="Brush Script MT, Segoe Script, Lucida Handwriting, cursive"
      font-size="56"
      font-weight="500"
      fill="#fff0c5"
      stroke="#24130b"
      stroke-width="1.4"
      paint-order="stroke">
      Fulô da Capitá
    </text>
  </g>

  <g opacity=".55" fill="none" stroke="#f2d58f" stroke-width="3" stroke-linecap="round">
    <path d="M92 165c14-8 29-8 43 0"/>
    <path d="M725 165c14-8 29-8 43 0"/>
    <path d="M104 178l16 14 16-14"/>
    <path d="M737 178l16 14 16-14"/>
  </g>
</svg>